name: rate_limiter_dashboard
description: "Professional dashboard for Rate Limiter Service monitoring and management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  
  # HTTP Client
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.1
  
  # Charts
  fl_chart: ^0.69.0
  
  # Shimmer loading
  shimmer: ^3.0.0
  
  # Pull to refresh
  pull_to_refresh: ^2.0.0
  
  # Intl for formatting
  intl: ^0.19.0
  flutter_dashboard: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
